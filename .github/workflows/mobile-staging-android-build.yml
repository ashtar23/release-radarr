name: Mobile Staging Android Build
run-name: Mobile staging Android build

on:
  workflow_dispatch:

jobs:
  build:
    name: Staging Android build
    uses: ./.github/workflows/mobile-build-reusable.yml
    with:
      app_env: staging
      platform: android
      build_profile: staging
      submit_profile: ""
      deploy_backend: false
    secrets:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_STAGING_PROJECT_REF }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_STAGING_URL }}
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_STAGING_PUBLISHABLE_KEY }}
