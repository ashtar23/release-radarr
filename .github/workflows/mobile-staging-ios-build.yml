name: Mobile Staging iOS Build
run-name: Mobile staging iOS build

on:
  workflow_dispatch:
    inputs:
      distribution_target:
        description: "Choose whether to build for internal install or TestFlight"
        required: true
        default: internal
        type: choice
        options:
          - internal
          - testflight

jobs:
  build:
    name: Staging iOS build
    uses: ./.github/workflows/mobile-build-reusable.yml
    with:
      app_env: staging
      platform: ios
      build_profile: ${{ github.event.inputs.distribution_target == 'testflight' && 'staging_testflight' || 'staging' }}
      submit_profile: ${{ github.event.inputs.distribution_target == 'testflight' && 'staging' || '' }}
      deploy_backend: false
    secrets:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_STAGING_PROJECT_REF }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_STAGING_URL }}
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_STAGING_PUBLISHABLE_KEY }}
