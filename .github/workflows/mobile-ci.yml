name: Mobile App CI
run-name: Mobile app CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  mobile:
    name: Mobile app verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint mobile
        run: pnpm lint --filter mobile

      - name: Typecheck mobile
        run: pnpm --filter mobile check-types
