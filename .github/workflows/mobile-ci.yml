name: Mobile App CI
run-name: Mobile app CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  mobile:
    name: Mobile app verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck shared types
        run: pnpm --filter @repo/types check-types

      - name: Typecheck API client
        run: pnpm --filter @repo/api-client check-types

      - name: Lint mobile
        run: pnpm lint --filter mobile

      - name: Typecheck mobile
        run: pnpm --filter mobile check-types

      - name: Check Supabase API function
        run: deno check --config supabase/functions/api/deno.json --lock=supabase/functions/api/deno.lock supabase/functions/api/index.ts
