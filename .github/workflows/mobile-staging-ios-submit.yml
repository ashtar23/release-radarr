name: Mobile Staging iOS Submit
run-name: Mobile staging iOS submit

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: "EAS build ID to submit to TestFlight"
        required: true
        type: string
      what_to_test:
        description: "Optional TestFlight 'What to Test' note"
        required: false
        type: string

jobs:
  submit:
    name: Submit staging iOS build to TestFlight
    runs-on: ubuntu-latest
    env:
      APP_ENV: staging
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Submit staging iOS build
        working-directory: apps/mobile
        env:
          WHAT_TO_TEST: ${{ github.event.inputs.what_to_test }}
        run: |
          if [ -n "$WHAT_TO_TEST" ]; then
            eas submit --platform ios --profile staging --id "${{ github.event.inputs.build_id }}" --what-to-test "$WHAT_TO_TEST" --non-interactive
          else
            eas submit --platform ios --profile staging --id "${{ github.event.inputs.build_id }}" --non-interactive
          fi
