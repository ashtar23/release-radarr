name: Mobile Release Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic app version to release (for example 1.2.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      APP_ENV: production
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PRODUCTION_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PRODUCTION_PROJECT_ID }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_PRODUCTION_URL }}
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PRODUCTION_PUBLISHABLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump mobile version
        run: pnpm release:mobile:version ${{ github.event.inputs.version }}

      - name: Verify mobile lint
        run: pnpm lint --filter mobile

      - name: Verify mobile typecheck
        run: pnpm --filter mobile check-types

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Push production database migrations
        run: supabase db push

      - name: Deploy production API function
        run: supabase functions deploy api

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Start production mobile build
        working-directory: apps/mobile
        run: eas build --platform all --profile production --non-interactive

      - name: Commit release version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/mobile/package.json
          git commit -m "chore(mobile): release v${{ github.event.inputs.version }}"
          git push origin HEAD:main
